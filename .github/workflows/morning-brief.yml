name: Morning Brief

on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate to 08:00 America/Chicago
        id: gate
        run: '[ "${{ github.event_name }}" = schedule ] && [ "$(TZ=America/Chicago date +%H)" != 08 ] && echo "skip=true" >> "$GITHUB_OUTPUT" || true'

      - name: Set up Node
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pip install -r requirements.txt

